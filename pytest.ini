[pytest]
minversion = 7.4
addopts = -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths =
    tests
    dreamos/tests
markers =
    audit: Project-level audit checks used for release and SSOT verification.
    contract: Contract/schema/state-machine compatibility checks.
    integration: Cross-module behavior and filesystem transport checks.
    unit: Fast isolated unit checks.
    phase1: Phase 1 (MVP communication layer) verification tests.
    phase2: Phase 2 (listener loop) verification tests.
    phase3: Phase 3 (robustness) verification tests.
    phase4: Phase 4 (logging/debug panel) verification tests.
